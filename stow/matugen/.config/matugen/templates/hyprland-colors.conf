exec = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'

$background = {{colors.background.default.hex}}
$surface = {{colors.surface.default.hex}}
$surface_container = {{colors.surface_container.default.hex}}
$primary = {{colors.primary.default.hex}}
$primary_fixed = {{colors.primary_fixed.default.hex}}
$secondary = {{colors.secondary.default.hex}}
$tertiary = {{colors.tertiary.default.hex}}
$on_surface = {{colors.on_surface.default.hex}}
$outline = {{colors.outline.default.hex}}
$source_color = {{colors.source_color.default.hex}}

general {
    col.active_border = rgba({{colors.primary.default.hex_stripped}}ff) rgba({{colors.tertiary.default.hex_stripped}}ff) 45deg
    col.inactive_border = rgba({{colors.surface_container.default.hex_stripped}}ff) rgba({{colors.outline_variant.default.hex_stripped}}ff) 45deg
}

group {
    col.border_active = rgba({{colors.primary.default.hex_stripped}}ff) rgba({{colors.tertiary.default.hex_stripped}}ff) 45deg
    col.border_inactive = rgba({{colors.surface_container.default.hex_stripped}}cc) rgba({{colors.outline_variant.default.hex_stripped}}cc) 45deg
    col.border_locked_active = rgba({{colors.on_primary.default.hex_stripped}}ff) rgba({{colors.on_secondary.default.hex_stripped}}ff) 45deg
    col.border_locked_inactive = rgba({{colors.surface.default.hex_stripped}}cc) rgba({{colors.surface_variant.default.hex_stripped}}cc) 45deg
}
