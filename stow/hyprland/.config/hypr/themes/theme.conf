# OLED Mono Theme - Pure Black & White

$GTK_THEME = Graphite-Mono
$ICON_THEME = Tela-circle-grey
$COLOR_SCHEME = prefer-dark

exec = gsettings set org.gnome.desktop.interface icon-theme $ICON_THEME
exec = gsettings set org.gnome.desktop.interface gtk-theme $GTK_THEME
exec = gsettings set org.gnome.desktop.interface color-scheme $COLOR_SCHEME

general {
    gaps_in = 2
    gaps_out = 4
    border_size = 1
    col.active_border = rgba(ffffffff) rgba(cccccccc) 45deg
    col.inactive_border = rgba(333333cc) rgba(111111cc) 45deg
    layout = dwindle
    resize_on_border = true
}

group {
    col.border_active = rgba(ffffffff) rgba(cccccccc) 45deg
    col.border_inactive = rgba(333333cc) rgba(111111cc) 45deg
    col.border_locked_active = rgba(ffffffff) rgba(cccccccc) 45deg
    col.border_locked_inactive = rgba(333333cc) rgba(111111cc) 45deg
}

decoration {
    rounding = 1
    shadow {
        enabled = false
    }
    blur {
        enabled = yes
        size = 4
        passes = 2
        new_optimizations = on
        ignore_opacity = on
        xray = false
    }
}

layerrule = unset,waybar
