# Configuración de monitores — Desktop (RTX 3070 + i5-10400F)
# Docs: https://wiki.hyprland.org/Configuring/Monitors/
#
# IMPORTANTE: los nombres de puerto (DP-1, DP-2, HDMI-A-1...) son PLACEHOLDERS.
# En la máquina nueva corre:   hyprctl monitors all
# y reemplaza los nombres por los reales que te muestre.
#
# Formato: monitor = NOMBRE, RESOLUCION@HZ, POSICION_XxY, ESCALA, transform, N
#   transform: 0=normal  1=90°  2=180°  3=270°  (4..7 = espejado)

# ── Monitor principal: 1080p @180Hz, montado VOLTEADO (rotado 180°) ──
# Si no tienes el monitor volteado cambia transform, 2 → transform, 0
monitor = DP-1, 1920x1080@180, 0x0, 1, transform, 2

# ── Monitor secundario: 1680x1050 @60Hz en VERTICAL (rotado 90°/270°) ──
# Al estar vertical ocupa 1050 de ancho. Lo coloco a la DERECHA del principal
# (que mide 1920 de ancho), por eso empieza en x=1920.
# transform 3 = gira 270° (parte de arriba a la izquierda). Si te queda al revés,
# cámbialo a 1 (90°). Si lo quieres a la IZQUIERDA, pon su posición en -1050x0
# y mueve el principal a 0x0 -> 1050x0 según prefieras.
monitor = HDMI-A-1, 1680x1050@60, 1920x0, 1, transform, 3

# ── Workspaces fijos por monitor (opcional, descomenta y ajusta nombres) ──
# workspace = 1, monitor:DP-1, default:true
# workspace = 2, monitor:DP-1
# workspace = 3, monitor:DP-1
# workspace = 4, monitor:DP-1
# workspace = 5, monitor:HDMI-A-1, default:true
# workspace = 6, monitor:HDMI-A-1

# ── Fallback: si conectas un monitor no listado, que se auto-configure ──
monitor = , preferred, auto, 1
